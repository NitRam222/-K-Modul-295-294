spring:
  application:
    name: smarttask

  datasource:
    url: jdbc:postgresql://localhost:5432/smarttask_db
    username: myuser
    password: myuser
    driver-class-name: org.postgresql.Driver

  sql:
    init:
      mode: never

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    defer-datasource-initialization: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        temp.use_jdbc_metadata_defaults: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8180/realms/myrealm
          jwk-set-uri: http://localhost:8180/realms/myrealm/protocol/openid-connect/certs

server:
  port: 8081
  servlet:
    context-path: /

springdoc:
  swagger-ui:
    use-root-path: true